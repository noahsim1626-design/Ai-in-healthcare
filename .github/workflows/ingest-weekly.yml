name: Ingest Weekly Batch

on:
  issues:
    types: [opened, edited, reopened, labeled]

permissions:
  contents: write
  issues: write

jobs:
  ingest:
    if: contains(github.event.issue.labels.*.name, 'weekly-batch')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run ingestion
        id: ingest
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node scripts/ingest-weekly.js

      - name: Commit scheduled posts
        if: steps.ingest.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/posts site/index.json ingest-report.md
          git commit -m "chore: ingest weekly batch from issue #${{ github.event.issue.number }}"
          git push origin main

      - name: Comment report on issue
        uses: actions/github-script@v7
        env:
          REPORT: ${{ steps.ingest.outputs.report }}
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: process.env.REPORT
            });
